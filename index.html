<!DOCTYPE html>
<html dir="rtl">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Meta Ads Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:sans-serif;min-height:100vh;direction:rtl}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#111118;border:1px solid #2a2a3a;border-radius:16px;padding:2.5rem;width:360px;max-width:95vw}
.logo{font-size:1.4rem;font-weight:900;color:#4f7fff;margin-bottom:.3rem}
.logo span{color:#00e5a0}
.sub{color:#6b6b8a;font-size:.85rem;margin-bottom:2rem}
.lbl{display:block;font-size:.7rem;font-weight:700;color:#6b6b8a;margin-bottom:.4rem;text-transform:uppercase}
.inp{width:100%;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;padding:.7rem 1rem;color:#e8e8f0;font-size:.9rem;outline:none;margin-bottom:1rem;direction:ltr}
.inp:focus{border-color:#4f7fff}
.btn-lo{width:100%;background:#4f7fff;color:#fff;border:none;border-radius:10px;padding:.85rem;font-size:1rem;font-weight:700;cursor:pointer}
.err{background:rgba(255,100,100,.1);border:1px solid rgba(255,100,100,.3);border-radius:8px;padding:.7rem 1rem;color:#ff6b6b;font-size:.83rem;margin-bottom:1rem;display:none}
</style></head><body>
<div id="p0" class="wrap"><div class="card">
<div class="logo">META<span>ADS</span> PRO</div>
<div class="sub">Connect to manage your campaigns</div>
<div id="err" class="err">Wrong username or password</div>
<label class="lbl">Username</label>
<input type="text" class="inp" id="u" placeholder="Username">
<label class="lbl">Password</label>
<input type="password" class="inp" id="p" placeholder="Password">
<button class="btn-lo" id="btn">Login</button>
</div></div>
<div id="app" style="display:none">
<h2 style="padding:2rem;color:#4f7fff">Dashboard loading...</h2>
</div>
<script>
(function() {
  var SID = localStorage.getItem("sid") || "";
  var btn = document.getElementById("btn");
  var errEl = document.getElementById("err");
  btn.addEventListener("click", function() {
    var u = document.getElementById("u").value.trim();
    var p = document.getElementById("p").value;
    if (!u || !p) return;
    btn.textContent = "Connecting...";
    btn.disabled = true;
    errEl.style.display = "none";
    fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username: u, password: p})
    }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) throw new Error("bad");
      SID = d.session;
      localStorage.setItem("sid", SID);
      document.getElementById("p0").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("app").innerHTML = "<h2 style='padding:2rem;color:#00e5a0'>Login successful! Dashboard coming soon.</h2>";
    }).catch(function() {
      errEl.style.display = "block";
      btn.textContent = "Login";
      btn.disabled = false;
    });
  });
  document.getElementById("p").addEventListener("keydown", function(e) {
    if (e.key === "Enter") btn.click();
  });
  if (SID) {
    fetch("/api/verify", {headers: {Authorization: SID}}).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) {
        document.getElementById("p0").style.display = "none";
        document.getElementById("app").style.display = "block";
      }
    }).catch(function() {});
  }
})();
</script>
</body></html>
